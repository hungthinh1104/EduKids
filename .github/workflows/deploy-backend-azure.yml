name: Deploy Backend → Azure

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "docker/Dockerfile.backend"
      - ".github/workflows/deploy-backend-azure.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  IMAGE_NAME: edukids-backend

jobs:
  # ─────────────────────────────────────────────
  # 0. CI GATES: Lint & Type Check (Pre-merge)
  # ─────────────────────────────────────────────
  ci-gates:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/backend
          npm ci
          npm run prisma:generate

      - name: ESLint - Backend
        run: |
          cd apps/backend
          npm run lint -- --exit-on-fatal-error
          echo "✅ ESLint passed"

      - name: TypeScript Type Check - Backend
        run: |
          cd apps/backend
          npx tsc --noEmit --strict

      - name: Prisma Schema Validate
        run: |
          cd apps/backend
          npx prisma validate

      - name: ✅ All CI gates passed
        run: echo "Lint, TypeScript, and Prisma validation successful"
    # ─────────────────────────────────────────────
  # 1. Build & push image to Docker Hub
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: ci-gates
    environment: ${{ github.event.inputs.environment || 'production' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ Missing secrets: DOCKER_USERNAME and/or DOCKER_PASSWORD"
            echo "Configure them in Environment secrets for: ${{ github.event.inputs.environment || 'production' }}"
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:cache,mode=max

      - name: Image summary
        run: |
          echo "✅ Pushed: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"

  # ─────────────────────────────────────────────
  # 2a. Deploy to Azure VM (via SSH)
  # ─────────────────────────────────────────────
  deploy-vm:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    # Switch to deploy-container-app if using Container Apps instead
    if: ${{ vars.DEPLOY_TARGET == 'vm' || vars.DEPLOY_TARGET == '' }}
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Validate VM SSH secrets
        id: vm-secrets
        run: |
          if [ -z "${{ secrets.VM_HOST }}" ] || [ -z "${{ secrets.VM_USERNAME }}" ] || [ -z "${{ secrets.VM_SSH_PRIVATE_KEY }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Missing VM_HOST, VM_USERNAME, or VM_SSH_PRIVATE_KEY. Skipping VM deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to VM via SSH
        if: steps.vm-secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
            echo "▶ Pulling image: $IMAGE"

            # Log in to Docker Hub on VM
            docker login \
              -u ${{ secrets.DOCKER_USERNAME }} \
              -p ${{ secrets.DOCKER_PASSWORD }}

            docker pull "$IMAGE"

            # Stop + remove old container gracefully
            docker stop edukids-backend 2>/dev/null || true
            docker rm   edukids-backend 2>/dev/null || true

            # ⭐ CRITICAL: Run migrations BEFORE starting app with new code
            echo "▶ Running Prisma migrations (before app deploy)..."
            docker run --rm \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NODE_ENV=production \
              "$IMAGE" \
              npm run prisma:migrate:deploy

            if [[ $? -ne 0 ]]; then
              echo "❌ Migration failed - aborting deploy to prevent app startup with incompatible schema"
              exit 1
            fi

            # Run new container (only if migrations succeeded)
            echo "▶ Starting app container (migrations already completed)..."
            docker run -d \
              --name edukids-backend \
              --restart unless-stopped \
              -p 3001:3001 \
              -e NODE_ENV=production \
              -e PORT=3001 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e REDIS_URL="${{ secrets.REDIS_URL }}" \
              -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
              -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
              -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRY="${{ vars.JWT_EXPIRY || '24h' }}" \
              -e FRONTEND_URL="${{ vars.FRONTEND_URL }}" \
              -e CORS_ORIGIN="${{ vars.CORS_ORIGIN }}" \
              -e PUBLIC_API_BASE_URL="${{ vars.PUBLIC_API_BASE_URL }}" \
              -e SMTP_HOST="${{ vars.SMTP_HOST }}" \
              -e SMTP_PORT="${{ vars.SMTP_PORT || '587' }}" \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              -e SMTP_FROM="${{ vars.SMTP_FROM }}" \
              -e AZURE_SPEECH_KEY="${{ secrets.AZURE_SPEECH_KEY }}" \
              -e AZURE_SPEECH_REGION="${{ vars.AZURE_SPEECH_REGION }}" \
              -e AZURE_SPEECH_LANGUAGE="${{ vars.AZURE_SPEECH_LANGUAGE || 'en-US' }}" \
              -e METRICS_TOKEN="${{ secrets.METRICS_TOKEN }}" \
              -e SENTRY_RELEASE="${{ github.sha }}" \
              "$IMAGE"

            # Health check (30 attempts × 3s = 90s timeout)
            echo "▶ Waiting for app health..."
            for i in $(seq 1 30); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3001/api/system/health || echo "000")
              if [[ "$STATUS" == "200" ]]; then
                echo "✅ Backend healthy (attempt $i)"
                break
              fi
              echo "  attempt $i/30 — HTTP $STATUS"
              sleep 3
              if [[ "$i" == "30" ]]; then
                echo "❌ Backend failed to start"
                docker logs edukids-backend --tail=60
                exit 1
              fi
            done

            # Cleanup old images (keep last 3)
            docker images ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }} --format "{{.ID}}" \
              | tail -n +4 | xargs docker rmi --force 2>/dev/null || true

            echo "🚀 Deploy complete: $IMAGE"

      - name: VM deploy skipped summary
        if: steps.vm-secrets.outputs.ready != 'true'
        run: echo "⏭️ VM deploy skipped because required SSH secrets are not configured."

  # ─────────────────────────────────────────────
  # 2b. Deploy to Azure Container Apps (alternative)
  # ─────────────────────────────────────────────
  deploy-container-app:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_TARGET == 'container-app' }}
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App revision
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.DOCKER_USERNAME }}
          containerAppName: ${{ vars.CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}
          environmentVariables: SENTRY_RELEASE=${{ github.sha }}
