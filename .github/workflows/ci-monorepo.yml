name: Monorepo CI Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend lint/test/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Unit tests
        run: npm test -- --runInBand

      - name: E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Security audit (critical only)
        run: npm audit --omit=dev --audit-level=critical

  frontend:
    name: Frontend lint/test/build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_WS_URL: ws://localhost:3001
          NEXT_PUBLIC_BASE_URL: http://localhost:3000

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright critical e2e
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

      - name: Security audit (high+)
        run: npm audit --audit-level=high

  secrets-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get install -y -qq ripgrep

      - name: Run secret scan script
        run: bash scripts/scan-secrets.sh
