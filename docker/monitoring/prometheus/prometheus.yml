global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: edukids

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: edukids-backend
    metrics_path: /api/metrics
    static_configs:
      - targets: ["backend:3001"]
        labels:
          service: backend

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: host

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: containers

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
