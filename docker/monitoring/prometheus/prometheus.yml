global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: edukids

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/recording.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: edukids-backend
    metrics_path: /api/metrics
    static_configs:
      - targets: ["backend:3001"]
        labels:
          service: backend
