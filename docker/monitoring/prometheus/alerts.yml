groups:
  - name: edukids-backend-alerts
    rules:
      - alert: BackendDown
        expr: up{job="edukids-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "EduKids backend is down"
          description: "Prometheus cannot scrape backend metrics for 2 minutes."

      - alert: HighBackendLatencyP95
        expr: histogram_quantile(0.95, sum(rate(edukids_http_request_duration_seconds_bucket[5m])) by (le)) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High backend latency (P95)"
          description: "P95 HTTP latency is above 1.5s for 10 minutes."

      - alert: HighBackend5xxRate
        expr: sum(rate(edukids_http_requests_total{status_code=~"5.."}[5m])) / clamp_min(sum(rate(edukids_http_requests_total[5m])), 1) > 0.03
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High backend 5xx error rate"
          description: "HTTP 5xx ratio is above 3% over the last 10 minutes."

  - name: infra-alerts
    rules:
      - alert: FrontendProbeDown
        expr: probe_success{job="blackbox-http", instance="http://frontend:3000"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Frontend probe failed"
          description: "Blackbox probe cannot reach frontend for 2 minutes."

      - alert: BackendHealthProbeDown
        expr: probe_success{job="blackbox-http", instance="http://backend:3001/api/system/health"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend health probe failed"
          description: "Blackbox probe cannot reach backend health endpoint for 2 minutes."

      - alert: PostgresExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres exporter down"
          description: "Prometheus cannot scrape postgres-exporter for 5 minutes."

      - alert: RedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis exporter down"
          description: "Prometheus cannot scrape redis-exporter for 5 minutes."

      - alert: HighContainerMemoryUsage
        expr: sum(container_memory_usage_bytes{name=~"edukids-.*"}) > 3.5e+09
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High container memory usage"
          description: "Combined EduKids container memory usage exceeded 3.5 GB for 10 minutes."
