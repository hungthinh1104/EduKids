groups:
  - name: edukids-recording-rules
    interval: 30s
    rules:
      - record: edukids:http_requests:rate5m
        expr: sum(rate(edukids_http_requests_total[5m]))

      - record: edukids:http_5xx_ratio:rate5m
        expr: sum(rate(edukids_http_requests_total{status_code=~"5.."}[5m])) / clamp_min(sum(rate(edukids_http_requests_total[5m])), 1)

      - record: edukids:http_latency:p95_5m
        expr: histogram_quantile(0.95, sum(rate(edukids_http_request_duration_seconds_bucket[5m])) by (le))

      - record: edukids:http_latency:p99_5m
        expr: histogram_quantile(0.99, sum(rate(edukids_http_request_duration_seconds_bucket[5m])) by (le))
